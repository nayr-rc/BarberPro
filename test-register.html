<!DOCTYPE html>
<html>
<head>
    <title>Test Registration API</title>
</head>
<body>
    <h1>BarberPro - Test Registration</h1>
    <button onclick="testRegister()">Test Registration</button>
    <pre id="result"></pre>

    <script>
        async function testRegister() {
            try {
                const response = await fetch('http://localhost:3001/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'João Silva',
                        email: 'joao@test.com',
                        phone: '11999999999',
                        password: 'senha123'
                    })
                });

                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2) + '\n\nStatus: ' + response.status;
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
